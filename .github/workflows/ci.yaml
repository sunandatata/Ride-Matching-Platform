name: CI Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - rider-service
          - driver-service
          - ride-service
          - location-service
          - matching-engine
          - eta-service
          - notification-service
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build ${{ matrix.service }}
      working-directory: backend/${{ matrix.service }}
      run: |
        mvn clean package -DskipTests -q

    - name: Run unit tests
      working-directory: backend/${{ matrix.service }}
      run: |
        mvn test -q

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.service }}
        path: backend/${{ matrix.service }}/target/surefire-reports/

    - name: SonarQube scan
      working-directory: backend/${{ matrix.service }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=rideshare-${{ matrix.service }} \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.java.binaries=target/classes
      continue-on-error: true

  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - rider-app
          - driver-app
          - admin-app
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

    - name: Install dependencies
      working-directory: frontend/${{ matrix.app }}
      run: npm ci --legacy-peer-deps

    - name: Build ${{ matrix.app }}
      working-directory: frontend/${{ matrix.app }}
      run: npm run build

    - name: Run tests
      working-directory: frontend/${{ matrix.app }}
      run: npm run test:unit --if-present
      continue-on-error: true

    - name: Run E2E tests
      working-directory: frontend/${{ matrix.app }}
      run: npm run test:e2e --if-present
      continue-on-error: true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Dependency check
      working-directory: backend
      run: |
        mvn org.owasp:dependency-check-maven:check \
          -DaggregateDependencies=true || true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_DB: rideshare_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
        options: >-
          --health-cmd "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9092:9092
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run integration tests
      working-directory: backend
      run: |
        mvn verify \
          -Dspring.datasource.url=jdbc:postgresql://localhost:5432/rideshare_test \
          -Dspring.datasource.username=postgres \
          -Dspring.datasource.password=postgres \
          -Dspring.redis.host=localhost \
          -Dspring.kafka.bootstrap-servers=localhost:9092 \
          -q

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend, integration-tests ]
    if: always()
    steps:
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          backend/*/target/surefire-reports/*.xml
        check_name: Unit Test Results
        comment_mode: always
