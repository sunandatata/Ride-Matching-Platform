user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10000;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Upstream service definitions
    upstream auth_backend {
        least_conn;
        server auth-service:8080 max_fails=3 fail_timeout=30s;
    }

    upstream rider_backend {
        least_conn;
        server rider-service:8080 max_fails=3 fail_timeout=30s;
    }

    upstream driver_backend {
        least_conn;
        server driver-service:8080 max_fails=3 fail_timeout=30s;
    }

    upstream ride_backend {
        least_conn;
        server ride-service:8080 max_fails=3 fail_timeout=30s;
    }

    upstream location_backend {
        least_conn;
        server location-service:8080 max_fails=3 fail_timeout=30s;
    }

    upstream matching_backend {
        least_conn;
        server matching-engine:8080 max_fails=3 fail_timeout=30s;
    }

    upstream eta_backend {
        least_conn;
        server eta-service:8080 max_fails=3 fail_timeout=30s;
    }

    upstream notification_backend {
        server notification-service:8080 max_fails=3 fail_timeout=30s;
    }

    # Main API Gateway server
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
        limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=1r/s;

        # Auth Service Routes
        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Rider Service Routes
        location /api/riders/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://rider_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Driver Service Routes
        location /api/drivers/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://driver_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Ride Service Routes
        location /api/rides/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ride_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Location Service Routes
        location /api/locations/ {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://location_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            # Allow larger body for location batch updates
            client_max_body_size 10M;
        }

        # Matching Engine Routes
        location /api/matching/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://matching_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ETA Service Routes
        location /api/eta/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://eta_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # WebSocket Notifications
        location /ws {
            limit_req zone=ws_limit burst=2 nodelay;
            proxy_pass http://notification_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Prometheus metrics endpoint
        location /metrics {
            access_log off;
            return 200 "gateway metrics not yet implemented\n";
            add_header Content-Type text/plain;
        }
    }
}
