---
# PostgreSQL Credentials - REPLACE WITH ACTUAL VALUES
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: data-layer
type: Opaque
stringData:
  username: postgres
  password: REPLACE_WITH_STRONG_PASSWORD_HERE
  jdbc-url: jdbc:postgresql://postgresql-primary.data-layer.svc.cluster.local:5432/rideshare

---
# JWT Secrets for Auth Service
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secrets
  namespace: microservices
type: Opaque
stringData:
  secret: REPLACE_WITH_STRONG_JWT_SECRET_HERE
  issuer: rideshare-platform
  algorithm: HS256

---
# API Keys for external services (routing, payment, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: microservices
type: Opaque
stringData:
  routing-api-key: REPLACE_WITH_GOOGLE_MAPS_API_KEY
  payment-processor-key: REPLACE_WITH_PAYMENT_PROCESSOR_KEY
  notification-service-key: REPLACE_WITH_NOTIFICATION_SERVICE_KEY

