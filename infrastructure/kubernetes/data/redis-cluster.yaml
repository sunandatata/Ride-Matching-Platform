---
# Redis Cluster StatefulSet
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: data-layer
data:
  redis.conf: |
    # Cluster configuration
    cluster-enabled yes
    cluster-node-timeout 5000
    cluster-migration-barrier 1

    # Performance
    maxmemory 1024mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

    # Replication
    min-replicas-to-write 1
    min-replicas-max-lag 10

---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: data-layer
  labels:
    app: redis
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
  - port: 6379
    name: redis
  - port: 16379
    name: cluster

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: data-layer
  labels:
    app: redis
spec:
  serviceName: redis-cluster
  replicas: 6  # 3 primary + 3 replica
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6379"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - redis
            topologyKey: kubernetes.io/hostname
      containers:
      - name: redis
        image: redis:7.2-alpine
        command:
        - redis-server
        - /etc/redis/redis.conf
        ports:
        - containerPort: 6379
          name: redis
        - containerPort: 16379
          name: cluster
        env:
        - name: POD_ORDINAL
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /etc/redis
      volumes:
      - name: config
        configMap:
          name: redis-config
      terminationGracePeriodSeconds: 30

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: ebs-gp3
      resources:
        requests:
          storage: 50Gi

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-pdb
  namespace: data-layer
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: redis
