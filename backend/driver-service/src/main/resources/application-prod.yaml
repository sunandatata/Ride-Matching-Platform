spring:
  application:
    name: driver-service

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false

  # DataSource Configuration - Production (using environment variables)
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/rideshare_driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      leak-detection-threshold: 60000

  # Redis Configuration - Production
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000
    ssl: ${REDIS_SSL:false}
    jedis:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 10
        max-wait: -1ms

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: false
    validateOnMigrate: true
    cleanDisabled: true

server:
  port: 8082
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    min-response-size: 1024
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10

logging:
  level:
    root: INFO
    com.rideshare: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

app:
  cache:
    ttl-minutes: 30
  metrics:
    cache-ttl-minutes: 30
