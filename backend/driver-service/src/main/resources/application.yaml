spring:
  application:
    name: driver-service

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/rideshare_driver
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # Redis Configuration
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000
    jedis:
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 2
        max-wait: -1ms

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: false
    validateOnMigrate: true
    cleanDisabled: true

server:
  port: 8083
  servlet:
    context-path: /api/v1

logging:
  level:
    root: INFO
    com.rideshare: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

app:
  cache:
    ttl-minutes: 30
  metrics:
    cache-ttl-minutes: 30
