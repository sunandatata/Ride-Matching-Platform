spring:
  application:
    name: location-service

  # JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: validate  # Flyway handles migrations
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL13Dialect
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
    show-sql: false

  # DataSource configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/location_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis configuration
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
      shutdown-timeout: 2000ms

  # Kafka configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: 1
      retries: 3
      batch-size: 32768
      linger-ms: 10
      compression-type: snappy
      request-timeout-ms: 30000
    topic:
      location-changed: location.changed

# Server configuration
server:
  port: 8082
  servlet:
    context-path: /
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10

# Logging configuration
logging:
  level:
    root: INFO
    com.rideshare.location: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Location service configuration
location:
  batch:
    size: 500
    window:
      ms: 100
  db:
    flush-interval-ms: 300000  # 5 minutes

# Actuator for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: when-authorized
