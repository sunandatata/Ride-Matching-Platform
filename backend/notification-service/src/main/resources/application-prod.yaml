spring:
  application:
    name: notification-service
  profiles:
    active: prod

  # Kafka Configuration - Production
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092}
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092}
      group-id: notification-service-prod
      auto-offset-reset: earliest
      max-poll-records: 500
      session-timeout-ms: 30000
      heartbeat-interval-ms: 10000
      connections-max-idle-ms: 540000
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092}
      acks: all
      retries: 5
      compression-type: snappy
      linger-ms: 100

  # Redis Configuration - Production
  data:
    redis:
      host: ${REDIS_HOST:redis-cluster-1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 5000
      ssl: true
      jedis:
        pool:
          max-active: 50
          max-idle: 25
          min-idle: 10
          max-wait: 5000

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Server Configuration
  server:
    port: ${SERVER_PORT:8081}
    servlet:
      context-path: /api/v1
    tomcat:
      threads:
        max: 500
        min-spare: 50
      accept-count: 300
      max-connections: 10000
      max-http-post-size: 2097152
    compression:
      enabled: true
      min-response-size: 1024
      mime-types: application/json,text/plain,text/html,text/xml,text/css,text/javascript,application/javascript

# Logging Configuration - Production
logging:
  level:
    root: WARN
    com.rideshare.notification: INFO
    org.springframework.kafka: WARN
    org.springframework.web.socket: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/notification-service/notification-service.log
    max-size: 100MB
    max-history: 90
    total-size-cap: 10GB

# Actuator Configuration - Production
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: notification-service
      environment: production
  server:
    port: ${ACTUATOR_PORT:8082}
    base-path: /actuator

# Notification Service Configuration - Production
notification:
  instance:
    id: ${HOSTNAME:notification-service-${random.uuid}}
  websocket:
    ping-interval-seconds: 30
    max-message-size: 131072  # 128KB
  kafka:
    max-poll-records: 500
    session-timeout-ms: 30000
  connection:
    ttl-seconds: 1800  # 30 minutes
    heartbeat-timeout-seconds: 300  # 5 minutes
  message:
    dedup-ttl-seconds: 3600  # 1 hour
