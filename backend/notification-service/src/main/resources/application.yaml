spring:
  application:
    name: notification-service
  profiles:
    active: dev

  # Server Configuration
  webflux:
    base-path: /api/v1

  # WebSocket Configuration
  websocket:
    allowed-origins: "*"

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      bootstrap-servers: localhost:9092
      group-id: notification-service
      auto-offset-reset: earliest
      max-poll-records: 100
      session-timeout-ms: 30000
      heartbeat-interval-ms: 10000
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      bootstrap-servers: localhost:9092
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Server Configuration
  server:
    port: 8082
    servlet:
      context-path: /api/v1
    tomcat:
      threads:
        max: 200
        min-spare: 10
      accept-count: 100
      max-connections: 5000

# Logging Configuration
logging:
  level:
    root: INFO
    com.rideshare.notification: DEBUG
    org.springframework.kafka: INFO
    org.springframework.web.socket: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/notification-service.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Notification Service Configuration
notification:
  instance:
    id: notification-service-${random.uuid}
  websocket:
    ping-interval-seconds: 30
    max-message-size: 65536
  kafka:
    max-poll-records: 100
    session-timeout-ms: 30000
  connection:
    ttl-seconds: 1800  # 30 minutes
    heartbeat-timeout-seconds: 300  # 5 minutes
  message:
    dedup-ttl-seconds: 3600  # 1 hour
