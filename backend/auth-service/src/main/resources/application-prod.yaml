# Production configuration
spring:
  application:
    name: auth-service
    version: 1.0.0

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
          fetch_size: 100

  # PostgreSQL datasource (production)
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: "SELECT 1"
      leak-detection-threshold: 60000

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: true

  # Redis (production cluster)
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 5000ms
      jedis:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: -1ms

# Authentication (production)
auth:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-hours: 1
    refresh-token-expiry-days: 7
    issuer: rideshare.local
    audience: rideshare-api

  mfa:
    enabled: true
    sms-provider: twilio
    twilio-account-sid: ${TWILIO_ACCOUNT_SID}
    twilio-auth-token: ${TWILIO_AUTH_TOKEN}
    twilio-phone-number: ${TWILIO_PHONE_NUMBER}

  login-attempt-blocking: true

# Server configuration
server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 10000

# Logging (production)
logging:
  level:
    root: WARN
    com.rideshare.auth: INFO
    org.springframework.security: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: /var/log/auth-service/auth-service.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 5GB

# Management endpoints (production)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Security headers
server:
  servlet:
    session:
      timeout: 30m
