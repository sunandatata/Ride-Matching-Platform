spring:
  application:
    name: auth-service
    version: 1.0.0

  # Web server configuration
  web:
    resources:
      cache:
        period: 31536000

  # JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # PostgreSQL datasource configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_service
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Flyway database migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: true

  # Redis configuration
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

# Authentication configuration
auth:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits}
    access-token-expiry-hours: 1
    refresh-token-expiry-days: 7
    issuer: rideshare.local
    audience: rideshare-api

  mfa:
    enabled: true
    sms-provider: twilio # or aws-sns, etc.

  login-attempt-blocking: true
  max-login-attempts: 5
  login-attempt-window-minutes: 15

# Server configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

# Logging configuration
logging:
  level:
    root: INFO
    com.rideshare.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/auth-service.log
    max-size: 10MB
    max-history: 30

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Actuator configuration
endpoints:
  health:
    sensitive: false
